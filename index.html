<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sree Meenakshi Amman Sarees</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans antialiased min-h-screen">

    <header class="bg-slate-900 text-white py-8 px-4 shadow-md text-center border-b border-orange-500">
        <h1 class="text-3xl font-black tracking-wider uppercase text-orange-400">Sree Meenakshi Amman Sarees</h1>
        <p class="text-xs text-slate-400 mt-1 tracking-widest uppercase">Premium Collection Direct From Loom</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div id="loadingState" class="col-span-full text-center py-12 text-gray-500 font-medium">
                Fetching latest premium collection... Please wait...
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://mzwkuhtwzsuzwxuiujkk.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_4GyLDREsM422Jl0sQYyxcQ_ykwCVYFz";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Puthu WhatsApp Number verified packka!
        const WHATSAPP_NUMBER = "917200073026"; 

        async function fetchProductsFromCloud() {
            const grid = document.getElementById('productGrid');
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                if (!products || products.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400">No stock live at the moment. Check back soon!</div>`;
                    return;
                }

                grid.innerHTML = ''; // Clear loading state

                products.forEach(prod => {
                    // WhatsApp ordering text setup
                    const messageText = encodeURIComponent(`Hello Sree Meenakshi Amman Sarees! I want to buy this:\n\n🛍️ *Product:* ${prod.title}\n💰 *Price:* ₹${prod.price}\n\nPlease share availability status.`);
                    const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${messageText}`;

                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition duration-200 flex flex-col";
                    card.innerHTML = `
                        <div class="relative pt-[125%] bg-gray-50 overflow-hidden">
                            <img src="${prod.image}" alt="${prod.title}" class="absolute inset-0 w-full h-full object-cover" loading="lazy">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="font-bold text-slate-800 text-base line-clamp-2 mb-1">${prod.title}</h3>
                            <p class="text-xs text-gray-500 line-clamp-2 mb-3 flex-grow">${prod.description || 'Premium material premium quality silk saree.'}</p>
                            <div class="flex items-center justify-between mt-auto pt-2 border-t border-gray-50">
                                <span class="text-lg font-black text-slate-900">₹${prod.price}</span>
                                <a href="${waLink}" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs px-3 py-2 rounded-xl transition shadow-sm flex items-center gap-1">
                                    Order via WhatsApp
                                </a>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-rose-500 font-bold">Failed to connect to Database: ${err.message}</div>`;
            }
        }

        window.onload = fetchProductsFromCloud;
    </script>
</body>
</html>
